<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 120" width="140" height="120">
  <!-- Shared stroke structure: A D A interlocked -->
  <g fill="none" stroke="#d4a853" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left A: left stroke -->
    <line x1="30" y1="95" x2="55" y2="25"/>
    <!-- Left A: right stroke = D's left stroke (shared) -->
    <line x1="70" y1="95" x2="55" y2="25"/>
    <!-- Left A: crossbar -->
    <line x1="42" y1="65" x2="62" y2="65"/>

    <!-- D: left stroke is shared with left A's right stroke -->
    <!-- D: right side (straight vertical) -->
    <line x1="70" y1="25" x2="70" y2="95"/>
    <!-- D: top curve (approximated with line to shared point) -->
    <path d="M 55 25 Q 60 20, 70 25"/>
    <!-- D: bottom curve -->
    <path d="M 55 95 Q 60 100, 70 95"/>

    <!-- Right A: left stroke = D's right stroke (shared) -->
    <line x1="70" y1="95" x2="85" y2="25"/>
    <!-- Right A: right stroke -->
    <line x1="110" y1="95" x2="85" y2="25"/>
    <!-- Right A: crossbar -->
    <line x1="78" y1="65" x2="98" y2="65"/>
  </g>

  <!-- Violet accent nodes at intersections -->
  <g fill="#7c6fcd">
    <circle cx="55" cy="25" r="3.5"/>
    <circle cx="70" cy="95" r="3.5"/>
    <circle cx="85" cy="25" r="3.5"/>
    <circle cx="70" cy="25" r="3.5"/>
  </g>
</svg>
