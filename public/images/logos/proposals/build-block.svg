<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="120" height="120">
  <!-- Top-left: gold filled -->
  <rect x="8" y="8" width="28" height="28" rx="2" fill="#d4a853"/>
  <!-- Top-right: violet filled -->
  <rect x="44" y="8" width="28" height="28" rx="2" fill="#7c6fcd"/>
  <!-- Bottom-left: ink filled -->
  <rect x="8" y="44" width="28" height="28" rx="2" fill="#e8e6e0"/>
  <!-- Bottom-right: outlined with gold stroke (building the next thing) -->
  <rect x="44" y="44" width="28" height="28" rx="2" fill="none" stroke="#d4a853" stroke-width="2.5"/>
</svg>
