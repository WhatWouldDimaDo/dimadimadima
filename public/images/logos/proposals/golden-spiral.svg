<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="goldFade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8c872"/>
      <stop offset="100%" stop-color="#d4a853" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
  <!-- Golden spiral as SVG path -->
  <path d="M 60 60 C 60 55, 63 52, 68 52 C 78 52, 82 60, 82 68 C 82 80, 72 92, 58 92 C 40 92, 28 78, 28 60 C 28 38, 46 22, 66 22 C 90 22, 108 42, 108 66"
        fill="none" stroke="url(#goldFade)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Origin dot -->
  <circle cx="60" cy="60" r="2.5" fill="#d4a853"/>
  <!-- "dima" text along the curve -->
  <text x="72" y="58" fill="#e8e6e0" font-family="Georgia, serif" font-size="10" font-style="italic" transform="rotate(-15, 72, 58)">dima</text>
  <!-- Fibonacci reference dots at spiral intersections -->
  <g fill="#d4a853" opacity="0.5">
    <circle cx="68" cy="52" r="1.5"/>
    <circle cx="82" cy="68" r="1.5"/>
    <circle cx="58" cy="92" r="1.5"/>
    <circle cx="28" cy="60" r="1.5"/>
  </g>
</svg>
