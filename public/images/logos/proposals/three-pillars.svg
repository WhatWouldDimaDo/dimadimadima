<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c872"/>
      <stop offset="100%" stop-color="#d4a853"/>
    </linearGradient>
    <linearGradient id="violetGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8d80d4"/>
      <stop offset="100%" stop-color="#7c6fcd"/>
    </linearGradient>
    <linearGradient id="mutedGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a09fa6"/>
      <stop offset="100%" stop-color="#8a8990"/>
    </linearGradient>
  </defs>
  <!-- Base line connecting all three -->
  <line x1="22" y1="95" x2="98" y2="95" stroke="#e8e6e0" stroke-width="2" stroke-linecap="round"/>
  <!-- Left pillar: gold, tallest (70px) -->
  <rect x="22" y="25" width="18" height="70" rx="4" fill="url(#goldGrad)"/>
  <!-- Center pillar: violet, medium (55px) -->
  <rect x="51" y="40" width="18" height="55" rx="4" fill="url(#violetGrad)"/>
  <!-- Right pillar: muted, shortest (40px) -->
  <rect x="80" y="55" width="18" height="40" rx="4" fill="url(#mutedGrad)"/>
</svg>
