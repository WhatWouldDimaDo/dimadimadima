<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- PCB Trace D shape -->
  <g fill="none" stroke="#d4a853" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round">
    <!-- Left vertical trace -->
    <line x1="40" y1="30" x2="40" y2="90"/>
    <!-- Top horizontal trace -->
    <line x1="40" y1="30" x2="55" y2="30"/>
    <!-- 45-degree top-right trace -->
    <line x1="55" y1="30" x2="80" y2="55"/>
    <!-- Right vertical trace -->
    <line x1="80" y1="55" x2="80" y2="75"/>
    <!-- 45-degree bottom-right trace -->
    <line x1="80" y1="75" x2="55" y2="90"/>
    <!-- Bottom horizontal trace -->
    <line x1="55" y1="90" x2="40" y2="90"/>
  </g>
  <!-- Gold nodes at junctions -->
  <g fill="#e8c872">
    <circle cx="40" cy="30" r="2.5"/>
    <circle cx="55" cy="30" r="2.5"/>
    <circle cx="80" cy="55" r="2.5"/>
    <circle cx="80" cy="75" r="2.5"/>
    <circle cx="55" cy="90" r="2.5"/>
    <circle cx="40" cy="90" r="2.5"/>
  </g>
  <!-- Internal trace lines to center -->
  <g fill="none" stroke="#d4a853" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <line x1="40" y1="30" x2="60" y2="60"/>
    <line x1="80" y1="55" x2="60" y2="60"/>
    <line x1="40" y1="90" x2="60" y2="60"/>
  </g>
  <!-- Center node -->
  <circle cx="60" cy="60" r="3" fill="#e8c872" opacity="0.7"/>
</svg>
