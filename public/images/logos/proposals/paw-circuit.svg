<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Main pad: geometric rounded shape in gold -->
  <path d="M 60 68 L 44 82 C 42 84, 42 88, 44 90 L 56 102 C 58 104, 62 104, 64 102 L 76 90 C 78 88, 78 84, 76 82 Z"
        fill="#d4a853"/>
  <!-- Four toe pads as circles/ellipses -->
  <ellipse cx="38" cy="50" rx="7" ry="9" fill="#d4a853" transform="rotate(-20, 38, 50)"/>
  <ellipse cx="52" cy="38" rx="6" ry="8" fill="#d4a853" transform="rotate(-5, 52, 38)"/>
  <ellipse cx="68" cy="38" rx="6" ry="8" fill="#d4a853" transform="rotate(5, 68, 38)"/>
  <ellipse cx="82" cy="50" rx="7" ry="9" fill="#d4a853" transform="rotate(20, 82, 50)"/>
  <!-- Circuit traces connecting toe pads to main pad -->
  <g fill="none" stroke="#8a8990" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Toe 1 to pad -->
    <line x1="38" y1="59" x2="46" y2="68"/>
    <line x1="46" y1="68" x2="52" y2="72"/>
    <!-- Toe 2 to pad -->
    <line x1="52" y1="46" x2="54" y2="56"/>
    <line x1="54" y1="56" x2="56" y2="64"/>
    <!-- Toe 3 to pad -->
    <line x1="68" y1="46" x2="66" y2="56"/>
    <line x1="66" y1="56" x2="64" y2="64"/>
    <!-- Toe 4 to pad -->
    <line x1="82" y1="59" x2="74" y2="68"/>
    <line x1="74" y1="68" x2="68" y2="72"/>
  </g>
  <!-- Circuit nodes at trace junctions -->
  <g fill="#e8c872">
    <circle cx="46" cy="68" r="1.5"/>
    <circle cx="54" cy="56" r="1.5"/>
    <circle cx="66" cy="56" r="1.5"/>
    <circle cx="74" cy="68" r="1.5"/>
  </g>
</svg>
